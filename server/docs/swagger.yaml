        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.GroupedFriendsResponse'
              type: object
      summary: 友链列表
      tags:
      - 友链
  /friends/apply:
