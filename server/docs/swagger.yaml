      description: 获取指定分组的公开配置项，根据配置项可见性规则筛选
      parameters:
      - description: 配置分组
        enum:
        - basic
        - blog
        - notification
        - upload
        - ai
        - oauth
        - wechat
        in: path
        name: group
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
